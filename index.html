<!DOCTYPE html>
<html lang="en">
<head>
    <title>The Raven: Digital Workbook</title>
    <style>
        body { font-family: 'Lora', serif; background-color: #2c3e50; color: #ecf0f1; margin: 0; padding: 20px; }
        .workbook { background: #fdf6e3; color: #333; padding: 30px; border-radius: 15px; max-width: 800px; margin: auto; border: 2px solid #5d4037; }
        h1 { color: #5d4037; text-align: center; }
        .card { background: #fff; padding: 15px; margin: 10px 0; border-left: 5px solid #5d4037; }
        button { background: #5d4037; color: white; border: none; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="workbook">
    <h1>The Raven: Student Lab</h1>
    
    <div style="text-align:center;">
        <iframe width="560" height="315" src="https://www.youtube.com/embed/bLiXjaPqSyY?start=0&end=260" frameborder="0" allowfullscreen></iframe>
    </div>

    <div class="card">
        <h3>Step 1: Listen & Read</h3>
        <p>Click the play button to hear Stanza 1, then read along:</p>
        <audio controls src="assets/audio_stanza_1.mp3"></audio>
    </div>

    <div class="card">
        <h3>Step 2: Analysis</h3>
        <p>Why does the author use the word "weary"?</p>
        <textarea style="width:100%"></textarea>
    </div>

    <button onclick="alert('Great work! Take a photo of your screen.')">Submit Workbook</button>
</div>
</body>
</html>
